{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student List</title>

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<div class="container">

<h1>Student List</h1>

<div class="cards">

{% for student in student_list %}

<div class="card">

    <img src="{{ student.image.url }}" alt="{{ student.first_name }}">

    <h2>{{ student.first_name }} {{ student.last_name }}</h2>

    <p>Age: {{ student.age }}</p>
    <p>Phone: {{ student.phone }}</p>
    <p>Email: {{ student.email }}</p>

    <div class="buttons">

        <a class="edit-btn" href="{% url 'student_edit' student.pk %}">
            Edit
        </a>

        <a class="delete-btn"
           href="{% url 'student_delete' student.pk %}"
           onclick="return confirm('Are you sure you want to delete this student?')">
            Delete
        </a>

    </div>

</div>

{% endfor %}

</div>

</div>

</body>
</html>
